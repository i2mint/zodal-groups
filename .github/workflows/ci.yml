name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  publish:
    name: Publish
    needs: validate
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      (contains(github.event.head_commit.message, '[publish]') ||
       contains(github.event.head_commit.message, '[force publish]'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # pnpm -r publish skips package versions already on the registry without erroring, so a
        # real failure (bad token, registry 5xx) is NOT swallowed — the job fails and no tag is
        # pushed for a release that never reached npm.
        run: |
          FORCE=""
          if [[ "${{ github.event.head_commit.message }}" == *"[force publish]"* ]]; then
            FORCE="--no-git-checks"
          fi
          pnpm -r publish --access public $FORCE

      - name: Configure SSH for git push
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git remote set-url origin git@github.com:${{ github.repository }}.git

      - name: Tag release
        # NOTE: the repo-wide tag is derived from groups-core, the lead package (the version
        # anchor). Once packages version independently, switch to per-package tags
        # (e.g. @zodal/groups-core@X).
        run: |
          VERSION=$(node -e "console.log(require('./packages/groups-core/package.json').version)")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}" || echo "Tag v${VERSION} already exists"
          git push origin "v${VERSION}" || echo "Tag already pushed"
